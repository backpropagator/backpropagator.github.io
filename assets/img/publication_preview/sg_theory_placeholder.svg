<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740" font-family="'Helvetica Neue','Inter',Arial,sans-serif">
  <defs>
    <filter id="panelShadow" x="-5%" y="-5%" width="110%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>

    <radialGradient id="cloudBlue" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#3b82f6" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudRose" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#e11d48" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#e11d48" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>

    <marker id="mBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="mRose" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e11d48"/>
    </marker>
    <marker id="mTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0d9488"/>
    </marker>
    <marker id="mGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1200" height="740" fill="#fafafa"/>

  <!-- HEADER -->
  <text x="600" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" letter-spacing="-0.2">Why diffusion models inherit bias</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#64748b">By Tweedie's formula, the unconditional score is a convex mixture of conditional scores weighted by attribute priors</text>

  <!-- =================== PANEL A : BIASED ===================== -->
  <rect x="60" y="100" width="520" height="420" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#panelShadow)"/>

  <circle cx="82" cy="132" r="4" fill="#dc2626"/>
  <text x="94" y="136" font-size="14" font-weight="600" fill="#0f172a">Standard sampling</text>
  <text x="94" y="155" font-size="12" fill="#64748b">Uses the natural training-set priors</text>
  <rect x="498" y="121" width="62" height="22" rx="11" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="529" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626" letter-spacing="1.4">BIASED</text>

  <line x1="82" y1="170" x2="558" y2="170" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Mode a₁ : dominant -->
  <ellipse cx="195" cy="280" rx="95" ry="70" fill="url(#cloudBlue)"/>
  <ellipse cx="195" cy="280" rx="95" ry="70" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <g fill="#1d4ed8" opacity="0.75">
    <circle cx="170" cy="265" r="1.6"/><circle cx="210" cy="255" r="1.6"/>
    <circle cx="228" cy="280" r="1.6"/><circle cx="160" cy="295" r="1.6"/>
    <circle cx="190" cy="310" r="1.6"/><circle cx="220" cy="300" r="1.6"/>
    <circle cx="150" cy="275" r="1.6"/><circle cx="200" cy="285" r="1.6"/>
    <circle cx="240" cy="270" r="1.6"/><circle cx="175" cy="320" r="1.6"/>
  </g>
  <text x="195" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#1e3a8a">a₁</text>
  <rect x="155" y="355" width="80" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="195" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#1e40af">p(a₁) = 0.88</text>

  <!-- Mode a₂ : rare -->
  <ellipse cx="470" cy="235" rx="42" ry="32" fill="url(#cloudRose)"/>
  <ellipse cx="470" cy="235" rx="42" ry="32" fill="none" stroke="#e11d48" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <g fill="#9f1239" opacity="0.8">
    <circle cx="458" cy="230" r="1.6"/><circle cx="475" cy="240" r="1.6"/>
    <circle cx="482" cy="228" r="1.6"/><circle cx="465" cy="248" r="1.6"/>
  </g>
  <text x="470" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#881337">a₂</text>
  <rect x="430" y="283" width="80" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="470" y="298" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#9f1239">p(a₂) = 0.12</text>

  <!-- Sample xₜ -->
  <circle cx="340" cy="445" r="11" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.18"/>
  <circle cx="340" cy="445" r="5" fill="#0f172a"/>
  <text x="353" y="450" font-family="Georgia,serif" font-size="15" font-style="italic" font-weight="600" fill="#0f172a">xₜ</text>

  <!-- Arrows -->
  <line x1="333" y1="439" x2="228" y2="318" stroke="#2563eb" stroke-width="4.5" stroke-linecap="round" marker-end="url(#mBlue)"/>
  <line x1="347" y1="438" x2="440" y2="268" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" marker-end="url(#mRose)" opacity="0.9"/>

  <!-- Arrow labels with leader lines -->
  <text x="85" y="420" font-family="Georgia,serif" font-size="11" font-style="italic" font-weight="600" fill="#1d4ed8">0.88 · ∇log p(xₜ | a₁)</text>
  <line x1="223" y1="413" x2="275" y2="385" stroke="#93c5fd" stroke-width="0.8" stroke-dasharray="2 2"/>

  <text x="475" y="380" font-family="Georgia,serif" font-size="11" font-style="italic" font-weight="600" fill="#be123c">0.12 · ∇log p(xₜ | a₂)</text>
  <line x1="474" y1="372" x2="430" y2="350" stroke="#fca5a5" stroke-width="0.8" stroke-dasharray="2 2"/>

  <!-- Takeaway strip -->
  <rect x="82" y="455" width="476" height="46" rx="8" fill="#fef7f7" stroke="#fecaca" stroke-width="1"/>
  <text x="320" y="473" text-anchor="middle" font-size="11" fill="#7f1d1d">Unconditional score collapses onto the majority mode</text>
  <text x="320" y="493" text-anchor="middle" font-family="Georgia,serif" font-size="14" font-style="italic" font-weight="600" fill="#9f1239">∇log p(xₜ)  ≈  ∇log p(xₜ | a₁)</text>

  <!-- ============== PANEL B : SCORE GUIDANCE ============ -->
  <rect x="620" y="100" width="520" height="420" rx="14" fill="#ffffff" stroke="#d1fae5" stroke-width="1" filter="url(#panelShadow)"/>

  <circle cx="642" cy="132" r="4" fill="#059669"/>
  <text x="654" y="136" font-size="14" font-weight="600" fill="#0f172a">Score guidance <tspan fill="#64748b" font-weight="400">(ours)</tspan></text>
  <text x="654" y="155" font-size="12" fill="#64748b">Replaces priors with a user-specified reference <tspan font-family="Georgia,serif" font-style="italic">p_ref</tspan></text>
  <rect x="1070" y="121" width="50" height="22" rx="11" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="1095" y="136" text-anchor="middle" font-size="10" font-weight="700" fill="#047857" letter-spacing="1.4">FAIR</text>

  <line x1="642" y1="170" x2="1118" y2="170" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Mode a₁ (equal size) -->
  <ellipse cx="760" cy="280" rx="62" ry="50" fill="url(#cloudBlue)"/>
  <ellipse cx="760" cy="280" rx="62" ry="50" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <g fill="#1d4ed8" opacity="0.7">
    <circle cx="745" cy="270" r="1.5"/><circle cx="775" cy="265" r="1.5"/>
    <circle cx="780" cy="290" r="1.5"/><circle cx="740" cy="295" r="1.5"/>
    <circle cx="760" cy="300" r="1.5"/>
  </g>
  <text x="760" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#1e3a8a">a₁</text>
  <rect x="722" y="345" width="76" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="760" y="360" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#1e40af">p_ref = 0.5</text>

  <!-- Mode a₂ (equal size) -->
  <ellipse cx="1000" cy="280" rx="62" ry="50" fill="url(#cloudRose)"/>
  <ellipse cx="1000" cy="280" rx="62" ry="50" fill="none" stroke="#e11d48" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <g fill="#9f1239" opacity="0.7">
    <circle cx="985" cy="270" r="1.5"/><circle cx="1015" cy="265" r="1.5"/>
    <circle cx="1020" cy="290" r="1.5"/><circle cx="980" cy="295" r="1.5"/>
    <circle cx="1000" cy="300" r="1.5"/>
  </g>
  <text x="1000" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="19" font-style="italic" font-weight="600" fill="#881337">a₂</text>
  <rect x="962" y="345" width="76" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="1000" y="360" text-anchor="middle" font-family="Georgia,serif" font-size="12" font-style="italic" fill="#9f1239">p_ref = 0.5</text>

  <!-- Sample xₜ -->
  <circle cx="880" cy="445" r="11" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.18"/>
  <circle cx="880" cy="445" r="5" fill="#0f172a"/>
  <text x="893" y="450" font-family="Georgia,serif" font-size="15" font-style="italic" font-weight="600" fill="#0f172a">xₜ</text>

  <!-- Ghost arrow: vanilla biased tendency -->
  <line x1="874" y1="439" x2="790" y2="325" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round" opacity="0.55" marker-end="url(#mGray)"/>
  <text x="665" y="408" font-size="10" fill="#94a3b8" font-style="italic">vanilla tendency (biased)</text>

  <!-- Equal-weight contributions (thin teal) -->
  <line x1="874" y1="438" x2="802" y2="332" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round" marker-end="url(#mTeal)" opacity="0.5"/>
  <line x1="886" y1="438" x2="958" y2="332" stroke="#0d9488" stroke-width="2.2" stroke-linecap="round" marker-end="url(#mTeal)" opacity="0.5"/>
  <!-- Resultant guided score pointing up (sum) -->
  <line x1="880" y1="435" x2="880" y2="328" stroke="#0d9488" stroke-width="5" stroke-linecap="round" marker-end="url(#mTeal)"/>
  <text x="895" y="385" font-family="Georgia,serif" font-size="12" font-style="italic" font-weight="600" fill="#0f766e">balanced score</text>

  <!-- Takeaway strip -->
  <rect x="642" y="455" width="476" height="46" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="880" y="473" text-anchor="middle" font-size="11" fill="#065f46">Reweighting with p_ref recovers a mode-balanced score</text>
  <text x="880" y="493" text-anchor="middle" font-family="Georgia,serif" font-size="13" font-style="italic" font-weight="600" fill="#047857">∇log p_ref(xₜ) = 0.5·∇log p(xₜ | a₁) + 0.5·∇log p(xₜ | a₂)</text>

  <!-- ============== EQUATION FOOTER ============ -->
  <rect x="60" y="555" width="1080" height="145" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#panelShadow)"/>
  <rect x="60" y="555" width="1080" height="3" fill="url(#accentBar)"/>

  <text x="600" y="590" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="2.4">TWEEDIE DECOMPOSITION — THE SOURCE OF BIAS</text>

  <!-- Clean single-string equation using unicode subscripts -->
  <text x="600" y="644" text-anchor="middle" font-family="Georgia,'Cambria',serif" font-size="26" font-style="italic" fill="#0f172a">∇ log p(xₜ)   =   Σᵢ   p(aᵢ) · ∇ log p(xₜ | aᵢ)</text>

  <!-- Annotation labels under equation terms -->
  <line x1="405" y1="658" x2="405" y2="672" stroke="#6366f1" stroke-width="1"/>
  <text x="405" y="686" text-anchor="middle" font-size="10.5" fill="#6366f1" font-weight="600" letter-spacing="0.4">unconditional score</text>

  <line x1="660" y1="658" x2="660" y2="672" stroke="#dc2626" stroke-width="1"/>
  <text x="660" y="686" text-anchor="middle" font-size="10.5" fill="#dc2626" font-weight="600" letter-spacing="0.4">attribute prior</text>

  <line x1="820" y1="658" x2="820" y2="672" stroke="#2563eb" stroke-width="1"/>
  <text x="820" y="686" text-anchor="middle" font-size="10.5" fill="#2563eb" font-weight="600" letter-spacing="0.4">conditional score</text>

  <!-- Small corner caption -->
  <text x="1130" y="725" text-anchor="end" font-size="10" fill="#cbd5e1" font-style="italic">score-guidance framework</text>
</svg>